<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
async function ai_edge_gallery_get_result(dataStr, secret) {
  const MCP_URL = (secret || "").trim();

  if (!MCP_URL.startsWith("http")) {
    return JSON.stringify({ error: "Invalid MCP URL. Paste the full URL including https://" });
  }

  async function mcpPost(payload, sessionId) {
    const headers = {
      "Content-Type": "application/json",
      "Accept": "application/json, text/event-stream"
    };
    if (sessionId) headers["mcp-session-id"] = sessionId;

    const res = await fetch(MCP_URL, {
      method: "POST",
      headers,
      body: JSON.stringify(payload)
    });

    const raw = await res.text();
    let jsonText = raw;
    if (raw.includes("data:")) {
      const lines = raw.trim().split("\n");
      for (let i = lines.length - 1; i >= 0; i--) {
        const line = lines[i].trim();
        if (line.startsWith("data:")) {
          jsonText = line.replace(/^data:\s*/, "");
          break;
        }
      }
    }
    return { data: JSON.parse(jsonText), sessionId: res.headers.get("mcp-session-id") };
  }

  let data;
  try {
    data = typeof dataStr === "string" ? JSON.parse(dataStr) : dataStr;
  } catch (e) {
    return JSON.stringify({ error: "Bad input JSON: " + dataStr });
  }

  const { tool, args } = data;

  try {
    // Initialize — capture session ID from response header
    const initResp = await mcpPost({
      jsonrpc: "2.0", id: 1, method: "initialize",
      params: {
        protocolVersion: "2024-11-05",
        capabilities: {},
        clientInfo: { name: "gemma-gallery", version: "1.0" }
      }
    });

    const sessionId = initResp.sessionId;

    // Send initialized notification with session ID
    mcpPost(
      { jsonrpc: "2.0", method: "notifications/initialized" },
      sessionId
    ).catch(() => {});

    // Call the tool with session ID
    const isListTools = tool === "list_tools";
    const resp = await mcpPost({
      jsonrpc: "2.0", id: 2,
      method: isListTools ? "tools/list" : "tools/call",
      params: isListTools ? {} : { name: tool, arguments: args || {} }
    }, sessionId);

    const result = resp.data;

    if (result.error) {
      return JSON.stringify({ error: result.error.message || JSON.stringify(result.error) });
    }

    const toolResult = result.result;

    if (isListTools) {
      return JSON.stringify({
        tools: (toolResult.tools || []).map(t => ({ name: t.name, description: t.description }))
      });
    }

    if (toolResult.isError) {
      return JSON.stringify({ error: toolResult.content?.[0]?.text || "Tool error" });
    }

    const text = (toolResult.content || [])
      .filter(c => c.type === "text")
      .map(c => c.text)
      .join("\n");

    return text || JSON.stringify(toolResult);

  } catch (e) {
    return JSON.stringify({ error: "Request failed: " + e.message });
  }
}

window.ai_edge_gallery_get_result = ai_edge_gallery_get_result;
</script>
</body>
</html>
