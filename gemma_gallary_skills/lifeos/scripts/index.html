
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeOS</title>
</head>
<body>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
// MCP_BASE is set at runtime from the secret (see entry point below).
// Secret format — paste the full MCP base URL, e.g.:
//   https://mcp.aimagen.in/mcp/yourname/yourtoken
let MCP_BASE = "";
const CONNECT_TIMEOUT_MS = 15000;
const TOOL_TIMEOUT_MS    = 30000;

// ── MCP SSE Client ────────────────────────────────────────────────────────────

class MCPClient {
  constructor() {
    this.sessionUrl = null;
    this.pending    = new Map();
    this.nextId     = 1;
    this.es         = null;
  }

  /**
   * Open SSE connection, receive session endpoint, initialise MCP session.
   * Resolves when ready to call tools.
   */
  async connect() {
    return new Promise((resolve, reject) => {
      const connTimer = setTimeout(
        () => reject(new Error("MCP connect timeout")),
        CONNECT_TIMEOUT_MS
      );

      this.es = new EventSource(`${MCP_BASE}/sse`);

      // Server sends "endpoint" event with the messages URL path
      this.es.addEventListener("endpoint", async (evt) => {
        clearTimeout(connTimer);
        this.sessionUrl = this._resolveUrl(evt.data.trim());

        try {
          // Step 1: initialise
          await this._request("initialize", {
            protocolVersion: "2024-11-05",
            capabilities:   {},
            clientInfo:     { name: "lifeos-gallery", version: "1.0.0" }
          });
          // Step 2: send initialized notification (no response expected)
          this._notify("notifications/initialized", {});
          resolve();
        } catch (err) {
          reject(err);
        }
      });

      // SSE messages carry JSON-RPC responses
      this.es.onmessage = (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch (_) { return; }
        if (msg.id == null) return;
        const handlers = this.pending.get(msg.id);
        if (!handlers) return;
        this.pending.delete(msg.id);
        msg.error
          ? handlers.reject(new Error(msg.error.message || JSON.stringify(msg.error)))
          : handlers.resolve(msg.result);
      };

      this.es.onerror = () => {
        if (!this.sessionUrl) {
          clearTimeout(connTimer);
          reject(new Error("SSE connection failed"));
        }
        // After connection: SSE auto-reconnects; ignore transient errors
      };
    });
  }

  /** Resolve endpoint path returned by SSE event against MCP_BASE. */
  _resolveUrl(path) {
    if (path.startsWith("http")) return path;
    // Absolute path (e.g. "/messages/?session_id=…") — prepend MCP_BASE
    // so the full auth prefix is preserved through the gateway.
    const clean = path.startsWith("/") ? path.slice(1) : path;
    return `${MCP_BASE.replace(/\/$/, "")}/${clean}`;
  }

  /** JSON-RPC request — expects a response. */
  async _request(method, params) {
    const id = this.nextId++;
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => {
        this.pending.delete(id);
        reject(new Error(`Timeout: ${method}`));
      }, TOOL_TIMEOUT_MS);

      this.pending.set(id, {
        resolve: (v) => { clearTimeout(timer); resolve(v); },
        reject:  (e) => { clearTimeout(timer); reject(e);  }
      });

      fetch(this.sessionUrl, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ jsonrpc: "2.0", id, method, params })
      }).catch((err) => {
        this.pending.delete(id);
        clearTimeout(timer);
        reject(err);
      });
    });
  }

  /** JSON-RPC notification — fire and forget. */
  _notify(method, params) {
    if (!this.sessionUrl) return;
    fetch(this.sessionUrl, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ jsonrpc: "2.0", method, params })
    }).catch(() => {});
  }

  /**
   * Call an MCP tool and return its text result.
   * FastMCP wraps results as: { content: [{ type: "text", text: "…" }] }
   */
  async tool(name, args = {}) {
    const result = await this._request("tools/call", { name, arguments: args });
    if (result?.content?.[0]?.text) return result.content[0].text;
    return JSON.stringify(result);
  }

  close() {
    if (this.es) { this.es.close(); this.es = null; }
  }
}

// ── Action → Tool mapping ─────────────────────────────────────────────────────

async function dispatch(action, params, client) {
  switch (action) {

    case "get_brief":
      return client.tool("get_brief");

    case "search":
      return client.tool("search_vault", {
        query: params.query,
        top_k: params.top_k || 5
      });

    case "context":
      return client.tool("get_context", { topic: params.topic });

    case "capture":
      return client.tool("add_note", {
        folder:  "00_inbox",
        title:   params.title,
        content: params.content,
        tags:    params.tags || []
      });

    case "today":
      return client.tool("get_today_note");

    case "week":
      return client.tool("get_weekly_note", { week: params.week || "" });

    case "work":
      return client.tool("get_work_snapshot");

    case "decisions":
      return client.tool("get_open_decisions");

    case "log_decision":
      return client.tool("log_decision", {
        title:    params.title,
        decision: params.decision,
        context:  params.context  || "",
        stakes:   params.stakes   || "medium"
      });

    case "open_decision":
      return client.tool("open_decision", {
        title:    params.title,
        context:  params.context,
        options:  params.options  || "",
        deadline: params.deadline || ""
      });

    case "meeting":
      return client.tool("add_meeting_note", {
        title:        params.title,
        attendees:    params.attendees    || [],
        notes:        params.notes        || "",
        action_items: params.action_items || "",
        meeting_date: params.date         || ""
      });

    case "append":
      return client.tool("append_to_file", {
        path:    params.path,
        content: params.content
      });

    case "read":
      return client.tool("get_file", { path: params.path });

    case "stats":
      return client.tool("get_vault_stats");

    default:
      throw new Error(`Unknown action: "${action}"`);
  }
}

// ── Entry point ───────────────────────────────────────────────────────────────

// Gallery passes secret as second argument when require-secret: true is set.
// Secret value: full MCP base URL, e.g. https://mcp.aimagen.in/mcp/name/token
window["ai_edge_gallery_get_result"] = async (data, secret) => {
  if (!secret || !secret.trim()) {
    return JSON.stringify({ error: "No MCP URL set. Open skill settings and paste your MCP base URL as the secret." });
  }
  MCP_BASE = secret.trim().replace(/\/$/, "");

  let parsed;
  try {
    parsed = JSON.parse(data);
  } catch (_) {
    return JSON.stringify({ error: "Invalid JSON input" });
  }

  const { action, ...params } = parsed;
  if (!action) return JSON.stringify({ error: "Missing required field: action" });

  const client = new MCPClient();
  try {
    await client.connect();
    const text = await dispatch(action, params, client);
    client.close();
    return JSON.stringify({ result: text });
  } catch (err) {
    client.close();
    return JSON.stringify({ error: String(err.message || err) });
  }
};
</script>
</body>
</html>
