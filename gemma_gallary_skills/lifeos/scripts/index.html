<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeOS</title>
</head>
<body>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
// MCP_BASE set at runtime from secret (see entry point).
// Secret value: full MCP base URL, e.g. https://mcp.aimagen.in/mcp/name/token
let MCP_BASE = "";
const TIMEOUT_MS = 30000;

// ── MCP Streamable-HTTP Client ────────────────────────────────────────────────
// Server uses FastMCP streamable HTTP transport (POST /mcp).
// Each request is a plain POST; session tracked via Mcp-Session-Id header.

class MCPClient {
  constructor() {
    this.sessionId = null;
    this.nextId    = 1;
  }

  async _post(body) {
    const isNotification = body.id === undefined;

    const headers = {
      "Content-Type": "application/json",
      "Accept":        "application/json, text/event-stream"
    };
    if (this.sessionId) headers["Mcp-Session-Id"] = this.sessionId;

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);

    let resp;
    try {
      resp = await fetch(MCP_BASE, {
        method:  "POST",
        headers,
        body:    JSON.stringify(body),
        signal:  controller.signal
      });
    } finally {
      clearTimeout(timer);
    }

    // Capture session ID issued by server
    const sid = resp.headers.get("Mcp-Session-Id");
    if (sid) this.sessionId = sid;

    if (!resp.ok) {
      const txt = await resp.text().catch(() => resp.statusText);
      throw new Error(`HTTP ${resp.status}: ${txt}`);
    }

    // Notifications → 202 Accepted, no response body expected
    if (isNotification || resp.status === 202) return null;

    const ct   = resp.headers.get("content-type") || "";
    const text = await resp.text();

    if (ct.includes("text/event-stream")) {
      // Parse SSE lines, find message matching our request id
      for (const line of text.split("\n")) {
        if (!line.startsWith("data: ")) continue;
        try {
          const msg = JSON.parse(line.slice(6));
          if (msg.id !== body.id) continue;
          if (msg.error) throw new Error(msg.error.message || JSON.stringify(msg.error));
          return msg.result;
        } catch (e) { if (e.message) throw e; }
      }
      throw new Error("No matching response in SSE stream");
    }

    // Standard JSON response
    const msg = JSON.parse(text);
    if (msg.error) throw new Error(msg.error.message || JSON.stringify(msg.error));
    return msg.result;
  }

  async connect() {
    const id = this.nextId++;
    await this._post({
      jsonrpc: "2.0", id,
      method:  "initialize",
      params:  {
        protocolVersion: "2024-11-05",
        capabilities:    {},
        clientInfo:      { name: "lifeos-gallery", version: "1.0.0" }
      }
    });
    // Notification — no id, no response expected
    await this._post({ jsonrpc: "2.0", method: "notifications/initialized", params: {} });
  }

  async tool(name, args = {}) {
    const id     = this.nextId++;
    const result = await this._post({
      jsonrpc: "2.0", id,
      method:  "tools/call",
      params:  { name, arguments: args }
    });
    if (result?.content?.[0]?.text) return result.content[0].text;
    return JSON.stringify(result);
  }
}

// ── Action → Tool mapping ─────────────────────────────────────────────────────

async function dispatch(action, params, client) {
  switch (action) {

    case "get_brief":
      return client.tool("get_brief");

    case "search":
      return client.tool("search_vault", {
        query: params.query,
        top_k: params.top_k || 5
      });

    case "context":
      return client.tool("get_context", { topic: params.topic });

    case "capture":
      return client.tool("add_note", {
        folder:  "00_inbox",
        title:   params.title,
        content: params.content,
        tags:    params.tags || []
      });

    case "today":
      return client.tool("get_today_note");

    case "week":
      return client.tool("get_weekly_note", { week: params.week || "" });

    case "work":
      return client.tool("get_work_snapshot");

    case "decisions":
      return client.tool("get_open_decisions");

    case "log_decision":
      return client.tool("log_decision", {
        title:    params.title,
        decision: params.decision,
        context:  params.context || "",
        stakes:   params.stakes  || "medium"
      });

    case "open_decision":
      return client.tool("open_decision", {
        title:    params.title,
        context:  params.context,
        options:  params.options  || "",
        deadline: params.deadline || ""
      });

    case "meeting":
      return client.tool("add_meeting_note", {
        title:        params.title,
        attendees:    params.attendees    || [],
        notes:        params.notes        || "",
        action_items: params.action_items || "",
        meeting_date: params.date         || ""
      });

    case "append":
      return client.tool("append_to_file", {
        path:    params.path,
        content: params.content
      });

    case "read":
      return client.tool("get_file", { path: params.path });

    case "stats":
      return client.tool("get_vault_stats");

    default:
      throw new Error(`Unknown action: "${action}"`);
  }
}

// ── Entry point ───────────────────────────────────────────────────────────────

window["ai_edge_gallery_get_result"] = async (data, secret) => {
  if (!secret || !secret.trim()) {
    return JSON.stringify({ error: "No MCP URL set. Open skill settings and paste your MCP base URL as the secret." });
  }
  MCP_BASE = secret.trim().replace(/\/$/, "");

  let parsed;
  try {
    parsed = JSON.parse(data);
  } catch (_) {
    return JSON.stringify({ error: "Invalid JSON input" });
  }

  const { action, ...params } = parsed;
  if (!action) return JSON.stringify({ error: "Missing required field: action" });

  const client = new MCPClient();
  try {
    await client.connect();
    const text = await dispatch(action, params, client);
    return JSON.stringify({ result: text });
  } catch (err) {
    return JSON.stringify({ error: String(err.message || err) });
  }
};
</script>
</body>
</html>
